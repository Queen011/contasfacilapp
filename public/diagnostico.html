<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#10b981">
    <title>Diagnóstico APK — Contas Fácil</title>
    <style>
      :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body { margin: 0; background: #f8fafc; color: #0f172a; }
      main { max-width: 720px; margin: 0 auto; padding: 18px; }
      .card { background: white; border: 1px solid #dbe5e1; border-radius: 18px; padding: 16px; margin: 12px 0; box-shadow: 0 2px 12px rgba(15, 118, 110, .08); }
      h1 { margin: 0 0 4px; font-size: 22px; }
      p { margin: 6px 0; color: #475569; }
      label { display: block; margin: 14px 0 6px; font-size: 13px; font-weight: 700; color: #334155; }
      input, textarea { width: 100%; border: 1px solid #cbd5e1; border-radius: 14px; padding: 12px; font: 16px/1.4 system-ui, sans-serif; background: white; color: #0f172a; caret-color: #059669; outline: none; -webkit-user-select: text; user-select: text; touch-action: auto; }
      input:focus, textarea:focus { border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,.18); }
      button, a.btn { display: inline-flex; align-items: center; justify-content: center; min-height: 42px; padding: 10px 14px; border: 0; border-radius: 14px; background: #10b981; color: white; font-weight: 800; text-decoration: none; margin: 6px 6px 6px 0; }
      pre { white-space: pre-wrap; overflow-wrap: anywhere; background: #0f172a; color: #d1fae5; padding: 12px; border-radius: 14px; font-size: 12px; max-height: 260px; overflow: auto; }
      .badge { display: inline-block; border-radius: 999px; background: #d1fae5; color: #047857; padding: 4px 9px; font-size: 12px; font-weight: 800; }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <span class="badge">IME v7 estático — alvo Android 35</span>
        <h1>Diagnóstico de teclado do APK</h1>
        <p>Esta página é HTML puro e fica dentro do APK. Se aqui não digitar, o problema é WebView/teclado Android, não React.</p>
        <a class="btn" href="/">Voltar ao app</a>
        <button id="copy">Copiar logs</button>
        <button id="clear">Limpar</button>
      </div>

      <div class="card">
        <label for="texto">Campo texto puro</label>
        <input id="texto" type="text" inputmode="text" autocomplete="off" placeholder="Digite aqui">

        <label for="valor">Campo decimal puro</label>
        <input id="valor" type="text" inputmode="decimal" autocomplete="off" placeholder="123,45">

        <label for="obs">Textarea puro</label>
        <textarea id="obs" rows="4" placeholder="Digite observações"></textarea>
      </div>

      <div class="card">
        <p><b>User agent:</b> <span id="ua"></span></p>
        <p><b>Viewport:</b> <span id="vp"></span></p>
        <p><b>Foco atual:</b> <span id="focus">—</span></p>
        <pre id="logs"></pre>
      </div>
    </main>

    <script>
      const logs = [];
      const out = document.getElementById('logs');
      const focusOut = document.getElementById('focus');
      const vp = document.getElementById('vp');
      document.getElementById('ua').textContent = navigator.userAgent;
      function viewportLine() {
        const vv = window.visualViewport;
        vp.textContent = `inner=${innerWidth}x${innerHeight} visual=${vv ? Math.round(vv.width)+'x'+Math.round(vv.height) : 'sem visualViewport'}`;
      }
      function log(msg) {
        logs.unshift(`${new Date().toLocaleTimeString()} ${msg}`);
        out.textContent = logs.slice(0, 120).join('\n');
        viewportLine();
      }
      function id(el) { return el && (el.id || el.tagName); }
      ['texto','valor','obs'].forEach((inputId) => {
        const el = document.getElementById(inputId);
        el.addEventListener('focus', () => { focusOut.textContent = id(el); log(`FOCUS ${id(el)} value=${JSON.stringify(el.value)}`); });
        el.addEventListener('blur', () => log(`BLUR ${id(el)} value=${JSON.stringify(el.value)}`));
        el.addEventListener('beforeinput', (e) => log(`BEFOREINPUT ${id(el)} type=${e.inputType} data=${JSON.stringify(e.data)}`));
        el.addEventListener('input', () => log(`INPUT ${id(el)} value=${JSON.stringify(el.value)}`));
        el.addEventListener('keydown', (e) => log(`KEYDOWN ${id(el)} key=${JSON.stringify(e.key)} code=${e.code}`));
      });
      window.addEventListener('resize', () => log('WINDOW RESIZE'));
      window.visualViewport && window.visualViewport.addEventListener('resize', () => log('VISUAL VIEWPORT RESIZE'));
      document.getElementById('copy').addEventListener('click', async () => {
        await navigator.clipboard.writeText(logs.join('\n')).catch(() => {});
        log('LOGS COPIADOS');
      });
      document.getElementById('clear').addEventListener('click', () => { logs.length = 0; out.textContent = ''; log('LIMPO'); });
      viewportLine();
      log('Diagnóstico estático carregado — IME v7');
    </script>
  </body>
</html>
